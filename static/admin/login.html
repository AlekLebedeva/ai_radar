<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <title>AI Radar — Вход в админку</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">



    <link rel="stylesheet" href="/admin/static/css/base.css">
    <style>
        .login-body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-primary);
        }
        .login-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 40px 36px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .login-logo .logo-icon {
            font-size: 36px;
            color: var(--accent-blue);
        }
        .login-logo .logo-text {
            display: block;
            font-size: 20px;
            font-weight: 700;
            margin-top: 8px;
            letter-spacing: 0.5px;
        }
        .login-logo .logo-sub {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 4px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 500;
        }
        .form-control {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-control:focus {
            border-color: var(--accent-blue);
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        .btn-login:hover {
            background: var(--accent-blue-hover);
        }
        .login-error {
            color: var(--accent-red);
            font-size: 13px;
            text-align: center;
            margin-top: 14px;
            display: none;
        }
    </style>
</head>
<body class="login-body">
    <div class="login-card">
        <div class="login-logo">
            <div class="logo-icon">&#9673;</div>
            <span class="logo-text">AI RADAR</span>
            <div class="logo-sub">Вход в админку</div>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Логин</label>
                <input type="text" id="username" class="form-control" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" class="form-control" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login">Войти</button>
            <div class="login-error" id="errorMsg">Неверный логин или пароль</div>
        </form>
    </div>
    <script src="/admin/static/js/login.js"></script>
</body>
</html>
