<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Dashboard</title>
    <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        /* ========== ОСНОВНЫЕ СТИЛИ ИЗ ПРИМЕРА ========== */
        :root {
            --bg: #0f172a;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --accent-green: #10b981;
            --border: #334155;
            --radius: 8px;
            --radius-lg: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            line-height: 1.5;
        }

        /* Основные компоненты UI */
        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .tiles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .tile {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .tile:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            border-color: var(--accent);
        }

        .tile-icon { font-size: 36px; margin-bottom: 12px; }
        .tile h3 { font-size: 20px; margin-bottom: 8px; font-weight: 600; }
        .tile p { color: var(--text-muted); font-size: 14px; line-height: 1.5; margin-bottom: 8px; }

        .tile-badge {
            display: inline-block;
            padding: 4px 10px;
            background: rgba(59, 130, 246, 0.15);
            color: var(--accent);
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Панель фильтров */
        .filter-bar {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 32px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: flex-end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 140px;
        }

        .filter-group label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .filter-group input, .filter-group select {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: var(--radius);
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }

        .filter-group input:focus, .filter-group select:focus {
            border-color: var(--accent);
        }

        /* Кнопки */
        .btn {
            background: var(--bg-hover);
            border: none;
            padding: 8px 18px;
            border-radius: var(--radius);
            color: var(--text);
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-size: 13px;
        }

        .btn-primary {
            background: var(--accent);
        }
        .btn-primary:hover {
            background: var(--accent-hover);
        }
        .btn-green {
            background: var(--accent-green);
        }
        .btn-green:hover {
            background: #0d9488;
        }
        .btn-large {
            padding: 10px 24px;
            font-size: 14px;
        }

        /* Статистика */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .stats-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
        }

        .stats-card h3 {
            font-size: 16px;
            color: var(--text-muted);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-item {
            margin-bottom: 12px;
        }
        .stat-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 4px;
        }
        .stat-bar-bg {
            height: 6px;
            background: var(--bg-hover);
            border-radius: 4px;
            overflow: hidden;
        }
        .stat-bar-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 4px;
            width: 0%;
        }

        .period-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .period-btn {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            color: var(--text-muted);
        }
        .period-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* Список источников */
        .sources-cloud {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 32px;
        }
        .sources-cloud h3 {
            font-size: 14px;
            margin-bottom: 12px;
            color: var(--text-muted);
        }
        .source-chip {
            display: inline-block;
            background: var(--bg);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            margin: 0 8px 8px 0;
            border: 1px solid var(--border);
        }

        /* Пагинация */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 40px;
        }
        .page-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 14px;
            color: var(--text);
        }
        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .page-info {
            padding: 8px 0;
            color: var(--text-muted);
        }

        /* Детальная страница */
        .detail-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 24px;
        }
        .detail-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .raw-data {
            margin-top: 24px;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }
        .raw-data p {
            margin: 8px 0;
            font-size: 14px;
        }

        /* общие */
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-muted);
        }
        .no-data {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Компонент статистики
        const StatsPanel = ({ stats, period, setPeriod }) => {
            const categoryData = Object.entries(stats.by_category || {}).map(([name, value]) => ({ name, value }));
            const sourceData = Object.entries(stats.by_source || {}).map(([name, value]) => ({ name, value }));
            const maxCategory = Math.max(...categoryData.map(d => d.value), 1);
            const maxSource = Math.max(...sourceData.map(d => d.value), 1);
            
            return (
                <div className="stats-card">
                    <h3>Статистика</h3>
                    <div className="period-buttons">
                        <button onClick={() => setPeriod('week')} className={`period-btn ${period === 'week' ? 'active' : ''}`}>Неделя</button>
                        <button onClick={() => setPeriod('month')} className={`period-btn ${period === 'month' ? 'active' : ''}`}>Месяц</button>
                        <button onClick={() => setPeriod('all_time')} className={`period-btn ${period === 'all_time' ? 'active' : ''}`}>Всё время</button>
                    </div>
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '20px' }}>
                        <div>
                            <div style={{ fontSize: '13px', color: 'var(--text-muted)', marginBottom: '12px' }}>По категориям</div>
                            {categoryData.length === 0 && <div className="no-data" style={{ padding: '10px 0' }}>Нет данных</div>}
                            {categoryData.map(item => (
                                <div key={item.name} className="stat-item">
                                    <div className="stat-label">
                                        <span>{item.name}</span>
                                        <span>{item.value}</span>
                                    </div>
                                    <div className="stat-bar-bg">
                                        <div className="stat-bar-fill" style={{ width: `${(item.value / maxCategory) * 100}%` }}></div>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div>
                            <div style={{ fontSize: '13px', color: 'var(--text-muted)', marginBottom: '12px' }}>По источникам</div>
                            {sourceData.length === 0 && <div className="no-data" style={{ padding: '10px 0' }}>Нет данных</div>}
                            {sourceData.map(item => (
                                <div key={item.name} className="stat-item">
                                    <div className="stat-label">
                                        <span>{item.name}</span>
                                        <span>{item.value}</span>
                                    </div>
                                    <div className="stat-bar-bg">
                                        <div className="stat-bar-fill" style={{ width: `${(item.value / maxSource) * 100}%`, background: 'var(--accent-green)' }}></div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // Детальная страница модели
        const ModelDetail = ({ modelId, onClose }) => {
            const [model, setModel] = useState(null);
            const [loading, setLoading] = useState(true);
            
            useEffect(() => {
                if (modelId) {
                    axios.get(`/api/models/${modelId}`).then(res => {
                        setModel(res.data);
                        setLoading(false);
                    }).catch(err => {
                        console.error(err);
                        setLoading(false);
                    });
                }
            }, [modelId]);
            
            const copyLink = () => {
                navigator.clipboard.writeText(window.location.href);
                alert('Ссылка скопирована');
            };
            
            const exportSingleCSV = () => {
                if (!model) return;
                const data = [model.raw];
                const headers = Object.keys(data[0]).join(",");
                const values = Object.values(data[0]).join(",");
                const csvContent = "data:text/csv;charset=utf-8," + headers + "\n" + values;
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `${modelId}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };
            
            const handleSimilar = () => {
                alert("Похожие модели (заглушка)");
            };
            
            if (loading) return <div className="loading">Загрузка...</div>;
            if (!model) return <div className="loading">Модель не найдена</div>;
            
            return (
                <div className="detail-container">
                    <button onClick={onClose} className="back-link">← Назад к дашборду</button>
                    <div className="detail-card">
                        <h1 style={{ fontSize: '28px', marginBottom: '12px' }}>{model.raw.title || 'Без названия'}</h1>
                        <div style={{ display: 'flex', gap: '12px', marginBottom: '24px', flexWrap: 'wrap' }}>
                            <button onClick={copyLink} className="btn">Копировать ссылку</button>
                            <button onClick={exportSingleCSV} className="btn btn-green">Экспорт в CSV</button>
                            <button onClick={handleSimilar} className="btn btn-primary">Похожие</button>
                        </div>
                        <div className="raw-data">
                            <h3 style={{ marginBottom: '16px', fontSize: '18px' }}>Raw данные</h3>
                            <p><strong>Источник:</strong> {model.raw.source_id}</p>
                            <p><strong>Название:</strong> {model.raw.title}</p>
                            <p><strong>Домен знаний:</strong> {model.raw.domain}</p>
                            <p><strong>Описание:</strong> {model.raw.description}</p>
                            <p><strong>Ссылка:</strong> <a href={model.raw.url} target="_blank" style={{ color: 'var(--accent)' }}>{model.raw.url}</a></p>
                            <p><strong>Автор:</strong> {model.raw.author}</p>
                            <p><strong>Дата создания:</strong> {model.raw.created_at_source}</p>
                        </div>
                    </div>
                </div>
            );
        };
        
        // Главный дашборд
        const Dashboard = () => {
            const [models, setModels] = useState([]);
            const [total, setTotal] = useState(0);
            const [page, setPage] = useState(1);
            const [filters, setFilters] = useState({ category: '', license: '', date_from: '', date_to: '', min_popularity: '' });
            const [sortBy, setSortBy] = useState('date');
            const [sources, setSources] = useState([]);
            const [stats, setStats] = useState({ by_category: {}, by_source: {} });
            const [statsPeriod, setStatsPeriod] = useState('all_time');
            const [aiQuery, setAiQuery] = useState('');
            const [selectedModelId, setSelectedModelId] = useState(null);
            
            const fetchModels = async () => {
                const params = new URLSearchParams({
                    page, limit: 12, sort_by: sortBy,
                    ...(filters.category && { category: filters.category }),
                    ...(filters.license && { license: filters.license }),
                    ...(filters.date_from && { date_from: filters.date_from }),
                    ...(filters.date_to && { date_to: filters.date_to }),
                    ...(filters.min_popularity && { min_popularity: filters.min_popularity })
                });
                try {
                    const res = await axios.get(`/api/models?${params}`);
                    setModels(res.data.items);
                    setTotal(res.data.total);
                } catch(e) { console.error(e); }
            };
            
            const fetchSources = async () => {
                try {
                    const res = await axios.get('/api/sources');
                    setSources(res.data);
                } catch(e) { console.error(e); }
            };
            
            const fetchStats = async () => {
                try {
                    const res = await axios.get(`/api/stats?period=${statsPeriod}`);
                    setStats(res.data);
                } catch(e) { console.error(e); }
            };
            
            useEffect(() => {
                fetchModels();
            }, [page, filters, sortBy]);
            
            useEffect(() => {
                fetchSources();
                fetchStats();
            }, []);
            
            useEffect(() => {
                fetchStats();
            }, [statsPeriod]);
            
            const handleFilterChange = (e) => {
                setFilters({ ...filters, [e.target.name]: e.target.value });
                setPage(1);
            };
            
            const handleSortChange = (e) => {
                setSortBy(e.target.value);
                setPage(1);
            };
            
            const handleAIFilter = async () => {
                if (!aiQuery) return;
                await axios.post('/api/ai-filter', { query: aiQuery });
                alert(`AI-фильтр пока заглушка. Запрос: "${aiQuery}"`);
            };
            
            const handleVectorSearch = async (modelId) => {
                await axios.post('/api/vector-search', { model_id: modelId });
                alert(`Векторный поиск заглушка для модели ${modelId}`);
            };
            
            const exportCSV = () => {
                const params = new URLSearchParams();
                if (filters.category) params.append('category', filters.category);
                if (filters.license) params.append('license', filters.license);
                if (filters.date_from) params.append('date_from', filters.date_from);
                if (filters.date_to) params.append('date_to', filters.date_to);
                if (filters.min_popularity) params.append('min_popularity', filters.min_popularity);
                window.location.href = `/api/export_csv?${params.toString()}`;
            };
            const exportXLSX = () => {
                const params = new URLSearchParams();
                if (filters.category) params.append('category', filters.category);
                if (filters.license) params.append('license', filters.license);
                if (filters.date_from) params.append('date_from', filters.date_from);
                if (filters.date_to) params.append('date_to', filters.date_to);
                if (filters.min_popularity) params.append('min_popularity', filters.min_popularity);
                window.location.href = `/api/export_xlsx?${params.toString()}`;
            };
            
            if (selectedModelId) {
                return <ModelDetail modelId={selectedModelId} onClose={() => setSelectedModelId(null)} />;
            }
            
            return (
                <div className="main-content">
                    {/* Фильтры и сортировка */}
                    <div className="filter-bar">
                        <div className="filter-group">
                            <label>Категория</label>
                            <input type="text" name="category" placeholder="Категория" value={filters.category} onChange={handleFilterChange} />
                        </div>
                        <div className="filter-group">
                            <label>Лицензия</label>
                            <input type="text" name="license" placeholder="Лицензия" value={filters.license} onChange={handleFilterChange} />
                        </div>
                        <div className="filter-group">
                            <label>Дата от</label>
                            <input type="date" name="date_from" value={filters.date_from} onChange={handleFilterChange} />
                        </div>
                        <div className="filter-group">
                            <label>Дата до</label>
                            <input type="date" name="date_to" value={filters.date_to} onChange={handleFilterChange} />
                        </div>
                        <div className="filter-group">
                            <label>Мин. популярность</label>
                            <input type="number" name="min_popularity" placeholder="Мин. популярность" value={filters.min_popularity} onChange={handleFilterChange} />
                        </div>
                        <div className="filter-group">
                            <label>Сортировка</label>
                            <select value={sortBy} onChange={handleSortChange}>
                                <option value="date">По дате</option>
                                <option value="popularity">По популярности</option>
                            </select>
                        </div>
                        <div className="filter-group" style={{ flexDirection: 'row', alignItems: 'flex-end', gap: '8px' }}>
                            <button onClick={exportCSV} className="btn btn-green">Экспорт CSV</button>
                            <button onClick={exportXLSX} className="btn btn-primary">Экспорт XLSX</button>
                        </div>
                    </div>
                    
                    {/* AI-фильтр и статистика */}
                    <div className="stats-grid">
                        <div className="stats-card">
                            <h3>AI-фильтр (заглушка)</h3>
                            <div style={{ display: 'flex', gap: '10px', marginTop: '8px' }}>
                                <input 
                                    type="text" 
                                    value={aiQuery} 
                                    onChange={e => setAiQuery(e.target.value)} 
                                    placeholder="Например: модели для обработки изображений" 
                                    style={{ flex: 1, background: 'var(--bg)', border: '1px solid var(--border)', color: 'var(--text)', padding: '8px 12px', borderRadius: 'var(--radius)' }}
                                />
                                <button onClick={handleAIFilter} className="btn btn-primary">Поиск</button>
                            </div>
                        </div>
                        <StatsPanel stats={stats} period={statsPeriod} setPeriod={setStatsPeriod} />
                    </div>
                    
                    {/* Источники */}
                    <div className="sources-cloud">
                        <h3>Источники</h3>
                        {sources.map(src => <span key={src.id} className="source-chip">{src.name}</span>)}
                        {sources.length === 0 && <span className="source-chip">Загрузка...</span>}
                    </div>
                    
                    {/* Сетка моделей */}
                    <div className="tiles-grid">
                        {models.map(model => (
                            <div key={model.id} className="tile" onClick={() => setSelectedModelId(model.id)}>
                                <div className="tile-icon"></div>
                                <h3>{model.title || 'Без названия'}</h3>
                                <p className="tile-badge">{model.category || 'Общая'}</p>
                                <p>Лицензия: {model.license || '—'}</p>
                                <p>Популярность: {model.popularity_metric || '—'}</p>
                                <p style={{ fontSize: '13px', color: 'var(--text-muted)', marginTop: '8px' }}>{model.summary_ru ? model.summary_ru.substring(0, 85) : 'Нет описания'}</p>
                                <div style={{ marginTop: '16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                    <span style={{ fontSize: '11px', color: 'var(--text-muted)' }}>{model.source_name}</span>
                                    <button 
                                        onClick={(e) => { e.stopPropagation(); handleVectorSearch(model.id); }} 
                                        style={{ background: 'none', border: 'none', color: 'var(--accent)', cursor: 'pointer', fontSize: '12px', textDecoration: 'underline' }}
                                    >
                                        Найти похожие
                                    </button>
                                </div>
                            </div>
                        ))}
                    </div>
                    {total === 0 && <div className="no-data">Нет данных для отображения</div>}
                    
                    {/* Пагинация */}
                    {total > 0 && (
                        <div className="pagination">
                            <button disabled={page === 1} onClick={() => setPage(p => p-1)} className="page-btn">Назад</button>
                            <span className="page-info">Страница {page} из {Math.ceil(total/12)}</span>
                            <button disabled={page >= Math.ceil(total/12)} onClick={() => setPage(p => p+1)} className="page-btn">Вперёд</button>
                        </div>
                    )}
                </div>
            );
        };
        
        const rootElement = document.getElementById('root');
        if (ReactDOM.createRoot) {
            ReactDOM.createRoot(rootElement).render(<Dashboard />);
        } else {
            ReactDOM.render(<Dashboard />, rootElement);
        }
    </script>
</body>
</html>
